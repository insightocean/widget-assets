<!doctype html>

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

         page as a clean 1:1 inline player instead of a link summary card. -->

    <meta name="twitter:title" content="Six Steps to Liberation" />
    <meta name="twitter:player" content="https://insightocean.github.io/widget-assets/6-step-hexagon-embed-test-1/" />
    <meta name="twitter:player:width" content="680" />
    <meta name="twitter:player:height" content="680" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Six Steps to Liberation" />
    <meta property="og:url" content="https://insightocean.github.io/widget-assets/6-step-hexagon-embed-test-1/" />

    <style>
      @font-face {
        font-family: "Tiempos Text";
        src: url("assets/TiemposText-Regular.eot");
        src: url("assets/TiemposText-Regular.eot?#iefix") format("embedded-opentype"),
          url("assets/TiemposText-Regular.woff") format("woff"),
          url("assets/TiemposText-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Tiempos Headline";
        src: url("assets/TiemposHeadline-Medium.eot");
        src: url("assets/TiemposHeadline-Medium.eot?#iefix") format("embedded-opentype"),
          url("assets/TiemposHeadline-Medium.woff") format("woff"),
          url("assets/TiemposHeadline-Medium.ttf") format("truetype");
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --paper-base: #e8e3d4;
        --navy: #33291D;
        --navy-deep: #1f1812;
        --orange: #d97842;
        --orange-deep: #b85f30;
        --sky: #7fa8c9;
        --sky-deep: #5a86a8;
        --sky-navy: #4f6a85;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #1a1a1a;
        color: var(--navy);
        font-family: "Tiempos Text", Georgia, serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
      }

      /* Paper texture now lives on the square stage so the 1:1 crop reads
         clearly; the area outside the square is a neutral dark backdrop. */
      .square-stage {
        background-color: var(--paper-base);
        background-image: url("assets/paper-bg.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      /* Fixed 680x680 design stage; visually scaled by the fit() script so the
         full desktop composition shrinks uniformly at any embed size. */
      #stage {
        width: 680px;
        height: 680px;
        transform-origin: top left;
        overflow: hidden;
        position: relative;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .orbit-icon-btn:focus-visible {
        outline: 2px dashed var(--orange);
        outline-offset: 6px;
        border-radius: 50%;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(51, 41, 29, 0.18);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="stage"><div id="root"></div></div>

    <script>
      // Lock the app to a fixed 680x680 design viewport, then scale the whole
      // stage to the real available space. The app reads window.innerWidth/
      // innerHeight (see app.jsx), so spoof those before it loads.
      (function () {
        var D = 680;
        Object.defineProperty(window, "innerWidth", { get: function () { return D; }, configurable: true });
        Object.defineProperty(window, "innerHeight", { get: function () { return D; }, configurable: true });
        function realSize() {
          try {
            var f = window.frameElement;
            if (f) return { w: f.clientWidth, h: f.clientHeight };
          } catch (e) {}
          var el = document.documentElement;
          return { w: el.clientWidth, h: el.clientHeight };
        }
        function fit() {
          var r = realSize();
          var s = Math.min(r.w, r.h) / D;
          var stage = document.getElementById("stage");
          stage.style.transform = "scale(" + s + ")";
          stage.style.marginLeft = Math.max(0, (r.w - D * s) / 2) + "px";
        }
        window.addEventListener("resize", fit);
        fit();
      })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@11.11.17/dist/framer-motion.js"></script>
    <script>
      // Expose framer-motion globals for the JSX files
      window.motion = window.FramerMotion ? window.FramerMotion.motion : window.Motion ? window.Motion.motion : null;
      window.AnimatePresence = window.FramerMotion ? window.FramerMotion.AnimatePresence : window.Motion ? window.Motion.AnimatePresence : null;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

    <script type="text/babel" src="content.jsx"></script>
    <script type="text/babel" src="orbit.jsx"></script>
    <script type="text/babel" src="detail.jsx"></script>
    <script type="text/babel" src="launch.jsx"></script>
    <script type="text/babel" src="app.jsx"></script>
  </body>
</html>
